<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Branding: Offset & Intersect</title>
    <style>
        :root {
            /* 指定のカラーコード */
            --magenta: #d6008f;
            --cyan: #00b0c8;
            --bg-color: #f4f4f7;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            padding: 40px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .svg-wrapper {
            margin-bottom: 25px;
        }

        svg {
            /* ドロップシャドウで少し浮いた感じに */
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.1));
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin: 0;
        }

        .brand-slogan {
            font-size: 0.9rem;
            color: #777;
            margin-top: 5px;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="svg-wrapper">
        <svg width="250" height="250" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
            
            <polygon points="100,100 200,100 150,200" fill="var(--magenta)" opacity="0.9">
                <title>Magenta Triangle (Offset Left)</title>
            </polygon>

            <polygon points="150,150 250,150 200,50" fill="var(--cyan)" opacity="0.9">
                <title>Cyan Triangle (Offset Right)</title>
            </polygon>

        </svg>
    </div>
    
    <h1 class="brand-name">PolyFusion</h1>
    <p class="brand-slogan">Geometric & Intersecting Designs</p>
</div>

</body>
</html>

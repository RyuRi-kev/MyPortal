<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --white:#ffffff;
  --bg:#ffffff;
  --line:#e2eaf0;
  --line2:#c8d8e4;
  --ink:#1e2c38;
  --ink2:#52707f;
  --muted:#96b0bc;
  --magenta:#d6008f;
  --cyan:#00b0c8;
  --g1:var(--magenta);--g2:var(--cyan);
  --grad:linear-gradient(135deg,var(--cyan) 0%,var(--magenta) 100%);
  --grad-soft:linear-gradient(135deg,rgba(0,176,200,.1) 0%,rgba(214,0,143,.08) 100%);
  --r:10px;
  --sh:0 1px 4px rgba(0,60,80,.07),0 4px 20px rgba(0,60,80,.06);
  --sh2:0 2px 10px rgba(0,60,80,.09),0 8px 32px rgba(0,60,80,.08);
}
html{background:#fff;}
body{background:#fff;color:var(--ink);font-family:'Inter','Noto Sans JP',sans-serif;font-size:13.5px;line-height:1.6;min-height:100vh;-webkit-text-size-adjust:100%;text-size-adjust:100%;}

/* HEADER */
header{background:var(--grad);border:none;position:sticky;top:0;z-index:200;padding-top:env(safe-area-inset-top);}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;}
.logo{display:flex;align-items:center;gap:7px;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:.04em;text-decoration:none;color:#fff;}
.logo:hover{color:rgba(255,255,255,.85);}
.logo-mark{width:18px;height:18px;border-radius:5px;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;flex-shrink:0;}
#hdate{font-family:'Inter',sans-serif;font-size:11.5px;color:#fff;letter-spacing:.03em;}
.accent-strip{display:none;}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:24px 24px 80px;background:#fff;}
.section{margin-bottom:112px;background:#fff;}
#sec-calendar{margin-bottom:0;}
.section-header{display:flex;align-items:flex-end;gap:12px;margin-bottom:14px;padding-top:8px;}
.section-title{font-family:'Inter',sans-serif;font-size:50px;font-weight:1000;/*letter-spacing:.03em;*/text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.section-line{display:flex;align-items:center;margin-left:4px;}
.section-line svg{width:44px;height:44px;display:block;}
.section-count{font-family:'Inter',sans-serif;font-size:11px;color:var(--muted);margin-left:auto;}

/* ADD FORM - shadow only, no border */
.add-form{background:#fff;border:none;border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--sh);}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.form-row:last-child{margin-bottom:0;}
.fi{flex:1;min-width:100px;background:#f4f6f8;border:1px solid #e8ecf0;border-radius:6px;padding:8px 12px;font-family:'Noto Sans JP',sans-serif;font-size:13.5px;color:var(--ink);outline:none;transition:border-color .18s,background .18s;resize:vertical;}
.fi:focus{background:#fff;border-color:var(--cyan);}
::placeholder{color:var(--muted);}
.fi-auto{flex:0 0 auto;width:auto;}
textarea.fi{min-height:68px;}

/* CAT AUTOCOMPLETE */
.cat-wrap{position:relative;flex:1;min-width:100px;}
.cat-sug{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:400;background:var(--white);border:1px solid var(--line);border-radius:6px;box-shadow:var(--sh2);overflow:hidden;display:none;}
.cat-sug.open{display:block;}
.cs-item{padding:7px 12px;font-size:13px;cursor:pointer;transition:background .15s;}
.cs-item:hover{background:var(--bg);}

/* BUTTONS */
.btn{font-family:'Inter','Noto Sans JP',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;border-radius:6px;border:1px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-grad{background:var(--grad);color:#fff;border:none;box-shadow:0 2px 8px rgba(0,176,200,.2);}
.btn-grad:hover{opacity:.87;box-shadow:0 4px 16px rgba(214,0,143,.2);}
.btn-grad-outline{background:var(--grad);color:#fff;border:none;box-shadow:0 2px 8px rgba(214,0,143,.2);}
.btn-grad-outline:hover{opacity:.87;}
.btn-ghost{background:transparent;color:var(--ink2);border-color:var(--line);}
.btn-ghost:hover{border-color:var(--ink2);color:var(--ink);background:#f4f6f8;}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:5px;}

/* inline text action buttons (edit / delete) */
.btn-action{
  background:none;border:1px solid var(--line);
  border-radius:6px;cursor:pointer;
  color:var(--ink2);padding:4px 6px;
  transition:all .18s;line-height:1;white-space:nowrap;
  display:inline-flex;align-items:center;justify-content:center;
}
.btn-action svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.btn-action:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,176,200,.05);}
.btn-action.del:hover{border-color:#e05050;color:#e05050;background:rgba(224,80,80,.05);}

/* PIN LOCK */
#pin-lock{position:fixed;inset:0;background:var(--grad);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;}
#pin-lock.hidden{display:none;}
.pin-logo{width:72px;height:72px;border-radius:20px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:36px;font-weight:800;color:#fff;}
.pin-title{font-family:'Inter',sans-serif;font-size:15px;font-weight:500;color:rgba(255,255,255,.85);letter-spacing:.05em;}
.pin-dots{display:flex;gap:12px;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.6);background:transparent;transition:background .15s;}
.pin-dot.filled{background:#fff;border-color:#fff;}
.pin-error{font-size:12px;color:rgba(255,255,255,.7);height:16px;text-align:center;}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;}
.pin-key{width:72px;height:72px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.1);color:#fff;font-family:'Inter',sans-serif;font-size:22px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.pin-key:hover{background:rgba(255,255,255,.25);}
.pin-key:active{background:rgba(255,255,255,.4);transform:scale(.93);}
.pin-key.del{font-size:16px;}
.pin-key.empty{border:none;background:none;cursor:default;}
.cat-tab-wrap{display:inline-flex;align-items:center;gap:2px;}
.cat-order-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:10px;padding:1px 3px;line-height:1;border-radius:3px;transition:color .15s,background .15s;}
.cat-order-btn:hover{color:var(--cyan);background:rgba(0,176,200,.08);}
.cat-order-btn:disabled{opacity:.25;cursor:default;}

/* CAT TABS */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.cat-tab{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--line);background:var(--white);color:var(--ink2);cursor:pointer;transition:all .18s;}
.cat-tab:hover{border-color:var(--cyan);color:var(--cyan);}
.cat-tab.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,176,200,.18);}

/* CAT GROUP */
.cat-group{margin-bottom:12px;}
.cat-group-label{display:flex;align-items:center;gap:6px;margin-bottom:6px;padding-left:2px;}
.cat-badge{flex-grow:1;padding:2px 9px;border-radius:10px;font-size:10.5px;font-weight:500;background:linear-gradient(135deg,#00c8e0,#c020c0);border:none;}
.cat-badge-text{color:#fff;-webkit-text-fill-color:#fff;}
.item-card{background:#fff;border:none;border-radius:0;box-shadow:none;margin-bottom:2px;display:flex;align-items:stretch;position:relative;transition:background .15s;animation:rise .25s ease both;overflow:hidden;}
.item-card:hover{background:#fafafa;}
.item-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--grad);opacity:0;transition:opacity .2s;}
.item-card:hover::before{opacity:1;}
.item-card.dragging{opacity:.45;transform:scale(.97);}
.item-card.drag-over{background:rgba(0,176,200,.05);}

.drag-handle{padding:0 6px 0 10px;display:flex;align-items:center;color:var(--line2);cursor:grab;font-size:13px;user-select:none;touch-action:none;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}

.item-body{flex:1;padding:5px 10px 5px 0;min-width:0;}
.item-top{display:flex;align-items:flex-start;gap:6px;}
.item-main{flex:1;min-width:0;}
.item-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;padding-top:2px;}

/* link */
.link-name{font-size:13.5px;/*font-weight:500;*/color:var(--ink);text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.link-name:hover{color:var(--cyan);}
.link-url{display:none;}
.link-status{width:6px;height:6px;border-radius:50%;background:var(--line);flex-shrink:0;margin-top:6px;transition:background .3s;}
.ls-ok{background:#2d6a4f;box-shadow:0 0 4px rgba(45,106,79,.4);}
.ls-ng{background:#c0392b;}
.ls-chk{background:#e67e22;animation:blink .6s infinite;}

/* todo */
.todo-row{display:flex;align-items:center;gap:8px;}
.t-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--line2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all .18s;}
.done .t-check{background:var(--grad);border-color:transparent;}
.todo-txt{font-size:13.5px;}
.done .todo-txt{text-decoration:line-through;color:var(--muted);}
.p-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.ph{background:#c0392b;}.pm{background:#e67e22;}.pl{background:var(--muted);}

/* memo */
.memo-txt{font-size:13.5px;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
.memo-ts{font-family:'Inter',monospace;font-size:10.5px;color:var(--muted);margin-top:3px;}

/* edit form */
.edit-form{display:none;padding:8px 0 4px;}
.edit-form.open{display:block;}
.edit-form .form-row{margin-bottom:6px;}
.edit-form .form-row:last-child{margin-bottom:0;}

/* empty */
.empty{padding:24px;text-align:center;color:var(--muted);font-size:13px;border:1.5px dashed var(--line);border-radius:8px;}

/* FOOTER */
footer{position:fixed;bottom:0;left:0;right:0;background:var(--grad);border:none;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.footer-inner{max-width:1100px;margin:0 auto;padding:10px 24px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.footer-right{display:flex;gap:8px;align-items:center;}
.footer-ver{font-size:8px;color:var(--muted);}

/* FOOTER BUTTONS (Import / Export JSON) */
.btn-footer{
  font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
  padding:6px 14px;border-radius:6px;cursor:pointer;
  transition:all .15s;white-space:nowrap;
  border:1.5px solid rgba(255,255,255,.6);
  background:transparent;color:#fff;
}
.btn-footer:hover{background:rgba(255,255,255,.18);border-color:#fff;}
.btn-footer:active{background:rgba(255,255,255,.35);border-color:#fff;transform:scale(.96);}
.btn-footer.unsaved{background:rgba(255,255,255,.22);border-color:#fff;animation:unsaved-pulse 1.8s ease-in-out infinite;}
.btn-footer.unsaved::after{content:none;}
@keyframes unsaved-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.9),0 0 0 0 rgba(255,255,255,.5);}35%{box-shadow:0 0 0 7px rgba(255,255,255,.2),0 0 0 14px rgba(255,255,255,0);}50%{box-shadow:0 0 0 9px rgba(255,255,255,0),0 0 0 18px rgba(255,255,255,0);}}

/* WAKE LOCK */
.btn-wake{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:6px 12px;border-radius:5px;border:1.5px solid rgba(255,255,255,.5);background:transparent;color:rgba(255,255,255,.75);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.btn-wake:hover{border-color:#fff;color:#fff;}
.btn-wake:active{background:rgba(255,255,255,.2);transform:scale(.96);}
.btn-wake.on{background:rgba(255,255,255,.2);border-color:#fff;color:#fff;}
.btn-wake.off{opacity:.7;}
.wake-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);flex-shrink:0;transition:background .2s;}
.btn-wake.on .wake-dot{background:#fff;box-shadow:0 0 6px rgba(255,255,255,.8);}

/* TOAST */
#toast{position:fixed;bottom:64px;right:20px;z-index:9000;background:var(--ink2);color:#fff;font-size:12.5px;padding:9px 18px;border-radius:7px;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;box-shadow:0 4px 20px rgba(0,60,80,.2);}
#toast.show{opacity:1;transform:translateY(0);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,60,80,.25);z-index:500;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:12px;padding:28px 28px 20px;max-width:340px;width:calc(100% - 40px);box-shadow:0 8px 40px rgba(0,60,80,.12);animation:rise .2s ease;}
.modal h3{font-family:'Inter',sans-serif;font-size:16px;font-weight:600;margin-bottom:8px;}
.modal p{font-size:13.5px;color:var(--ink2);margin-bottom:20px;line-height:1.6;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}

/* TOP MINI NAV */
#mini-nav{
  position:fixed;top:calc(52px + env(safe-area-inset-top));left:0;right:0;z-index:190;
  background:#fff;
  border-bottom:1px solid var(--line);
  transform:translateY(-100%);opacity:0;
  transition:transform .25s ease,opacity .25s ease;
  pointer-events:none;
}
#mini-nav.visible{transform:translateY(0);opacity:1;pointer-events:auto;}
.mnav-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;height:38px;align-items:stretch;}
.mnav-btn{
  display:flex;align-items:center;gap:6px;
  padding:0 16px;border:none;background:none;
  font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;
  color:var(--muted);cursor:pointer;
  position:relative;transition:color .18s;
}
.mnav-btn::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--grad);border-radius:2px 2px 0 0;
  opacity:0;transition:opacity .18s;
}
.mnav-btn.active{color:var(--cyan);}
.mnav-btn.active::after{opacity:1;}
.mnav-btn:hover{color:var(--cyan);}

/* ANIMATIONS */
@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

/* RESPONSIVE */
@media(max-width:600px){
  .header-inner,.footer-inner{padding-left:16px;padding-right:16px;}
  main{padding:16px 16px 80px;}
  #hclock{display:none;}
  .form-row{flex-direction:column;}
  .fi-auto,.cat-wrap{flex:none;width:100%;}
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px;}

/* NETWORK DIVIDER */
.network-divider{width:100%;overflow:hidden;line-height:0;margin:8px 0;}
.network-svg{width:100%;height:80px;display:block;}
.net-lines line{transition:stroke-opacity .3s;}
.net-dots circle{transition:fill-opacity .3s;}

/* CALENDAR */
.cal-wrap{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:16px;margin-bottom:14px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px 10px;border-radius:6px;color:var(--ink2);transition:background .15s,color .15s;}
.cal-nav-btn:hover{background:rgba(0,176,200,.08);color:var(--cyan);}
.cal-months{display:flex;gap:50px;flex-wrap:nowrap;justify-content:center;}
@media(max-width:600px){.cal-months{flex-direction:column;gap:12px;align-items:center;}}
.cal-month{flex:0 1 40%;min-width:0;}
@media(max-width:600px){.cal-month{width:92%;flex:none;}}
.cal-month-title{text-align:center;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;margin-bottom:8px;background:linear-gradient(135deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-family:'Inter',sans-serif;font-size:10px;font-weight:500;padding:3px 0;background:linear-gradient(135deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cal-day{text-align:center;font-family:'Inter',sans-serif;font-size:12px;padding:4px 0;border-radius:4px;color:var(--ink);line-height:1.4;}
.cal-day.empty{color:transparent;}
.cal-day.today{border:none;border-radius:6px;position:relative;background:transparent;font-weight:700;isolation:isolate;color:#fff !important;-webkit-text-fill-color:#fff !important;}
.cal-day.today::after{content:'';position:absolute;inset:-1.5px;border-radius:7px;background:linear-gradient(135deg,var(--cyan),var(--magenta));z-index:-1;}

<script>
// ── PIN LOCK ──────────────────────────────────────────
const PIN_HASH='0b91edfb9b92dbe6d542811646110b397dc3ed03deca90cbc9758a4a85dbf622';
const PIN_LEN=10;
var pinBuf='';
var pinUnlocked=false;

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function pinInput(d){
  if(pinBuf.length>=PIN_LEN)return;
  pinBuf+=d;
  updatePinDots();
  if(pinBuf.length===PIN_LEN)pinCheck();
}

function pinDel(){
  if(!pinBuf.length)return;
  pinBuf=pinBuf.slice(0,-1);
  updatePinDots();
  document.getElementById('pin-error').textContent='';
}

function updatePinDots(){
  for(var i=0;i<PIN_LEN;i++){
    document.getElementById('pd'+i).classList.toggle('filled',i<pinBuf.length);
  }
}

async function pinCheck(){
  const h=await sha256(pinBuf);
  if(h===PIN_HASH){
    pinUnlocked=true;
    document.getElementById('pin-lock').classList.add('hidden');
    sessionStorage.setItem('pin_ok','1');
  } else {
    document.getElementById('pin-error').textContent='PINが違います';
    pinBuf='';
    updatePinDots();
    // shake animation
    const lock=document.getElementById('pin-lock');
    lock.style.animation='shake .3s ease';
    setTimeout(()=>lock.style.animation='',300);
  }
}

// セッション中はロック解除済みを維持
if(sessionStorage.getItem('pin_ok')==='1'){
  document.getElementById('pin-lock').classList.add('hidden');
  pinUnlocked=true;
}

// キーボード入力対応
document.addEventListener('keydown',function(e){
  if(pinUnlocked)return;
  if(e.key>='0'&&e.key<='9')pinInput(e.key);
  else if(e.key==='Backspace')pinDel();
});

// ── STORAGE ──────────────────────────────────────────────
const S={
  get(k,d){try{return JSON.parse(localStorage.getItem(k))||d;}catch{return d;}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v));}
};
let todos=S.get('mp_todos',[]);
let links=S.get('mp_links',[]);
let memos=S.get('mp_memos',[]);

// ── DATE ──────────────────────────────────────────────
(function updateDate(){
  const d=new Date(),p=n=>n.toString().padStart(2,'0');
  const D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('hdate').textContent=`${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${D[d.getDay()]}`;
  // update at midnight
  const msToMidnight=(new Date().setHours(24,0,0,0))-Date.now();
  setTimeout(updateDate,msToMidnight);
})();

// ── UTILS ─────────────────────────────────────────────
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const nowStr=()=>{const d=new Date(),p=n=>n.toString().padStart(2,'0');return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;};
const getCats=arr=>[...new Set(arr.map(x=>x.cat||'').filter(Boolean))];
const groupBy=arr=>{const g={};arr.forEach(x=>{const c=x.cat||'';if(!g[c])g[c]=[];g[c].push(x);});return g;};

function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2200);}

// ── DELETE MODAL ───────────────────────────────────────
let _dcb=null;
function confirmDel(cb){_dcb=cb;document.getElementById('del-modal').classList.add('open');document.getElementById('del-ok').onclick=()=>{_dcb&&_dcb();closeModal();};}
function closeModal(){document.getElementById('del-modal').classList.remove('open');}

// ── CAT AUTOCOMPLETE ───────────────────────────────────
function bindCatAC(inputId,sugId,getCatsFn){
  const inp=document.getElementById(inputId);
  const sug=document.getElementById(sugId);
  if(!inp||!sug)return;
  inp.addEventListener('input',()=>{
    const v=inp.value.toLowerCase();
    const cs=getCatsFn().filter(c=>c.toLowerCase().includes(v));
    if(cs.length&&inp.value){
      var html='';
      cs.forEach(function(c){
        html+='<div class="cs-item" onmousedown="event.preventDefault();document.getElementById(\''+inputId+'\').value=\''+esc(c)+'\';document.getElementById(\''+sugId+'\').classList.remove(\'open\')">'+esc(c)+'</div>';
      });
      sug.innerHTML=html;
      sug.classList.add('open');
    }else sug.classList.remove('open');
  });
  inp.addEventListener('blur',()=>setTimeout(()=>sug.classList.remove('open'),150));
}

// ── SORT (touch + mouse, iOS compatible) ──────────────
function setupDrag(containerId,arr,key,renderFn){
  const container=document.getElementById(containerId);
  if(!container)return;

  container.querySelectorAll('.item-card[data-id]').forEach(card=>{
    const handle=card.querySelector('.drag-handle');
    if(!handle)return;

    let active=false,startY=0,origIdx=-1,clone=null,ghost=null;

    function allCards(){return [...container.querySelectorAll('.item-card[data-id]')];}

    function begin(clientY){
      active=true;
      startY=clientY;
      origIdx=allCards().indexOf(card);
      const r=card.getBoundingClientRect();
      // ghost placeholder
      ghost=document.createElement('div');
      ghost.style.cssText=`height:${r.height}px;margin-bottom:5px;border-radius:8px;background:rgba(0,176,200,.07);border:1.5px dashed rgba(0,176,200,.3);flex-shrink:0;`;
      card.after(ghost);
      // floating clone
      clone=card.cloneNode(true);
      clone.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;z-index:9999;opacity:.85;box-shadow:0 8px 32px rgba(0,60,80,.2);pointer-events:none;border-radius:8px;`;
      document.body.appendChild(clone);
      card.style.opacity='0';
    }

    function move(clientY){
      if(!active||!clone)return;
      const r=card.getBoundingClientRect();
      clone.style.top=(clientY-(startY-r.top))+'px';
      const others=allCards().filter(c=>c!==card);
      let before=null;
      for(const c of others){
        const cr=c.getBoundingClientRect();
        if(clientY<cr.top+cr.height*.5){before=c;break;}
      }
      try{
        // FLIP: 移動前の座標を記録
        const rectBefore=ghost.getBoundingClientRect();
        let moved=false;
        if(before){
          if(ghost.nextSibling!==before||ghost.parentNode!==before.parentNode){
            before.parentNode.insertBefore(ghost,before);moved=true;
          }
        }else{
          const lastCard=others[others.length-1];
          const target=lastCard?lastCard.parentNode:container;
          if(ghost.parentNode!==target||ghost.nextSibling!==null){
            target.appendChild(ghost);moved=true;
          }
        }
        if(moved){
          // FLIP: 移動後の座標との差分を transform で打ち消し→transitionで戻す
          const rectAfter=ghost.getBoundingClientRect();
          const dy=rectBefore.top-rectAfter.top;
          ghost.style.transition='none';
          ghost.style.transform=`translateY(${dy}px)`;
          ghost.getBoundingClientRect(); // reflow
          ghost.style.transition='transform 0.18s cubic-bezier(.4,0,.2,1)';
          ghost.style.transform='translateY(0)';
        }
      }catch(e){}
    }

    function end(){
      if(!active)return;
      active=false;
      if(clone){clone.remove();clone=null;}
      card.style.opacity='';
      // determine new index from ghost position among all cards
      const allC=allCards();
      // find which card the ghost is before (in DOM order among cards+ghost)
      let insertBeforeId=null;
      if(ghost){
        const ghostParent=ghost.parentNode;
        if(ghostParent){
          // walk siblings after ghost to find next card
          let sib=ghost.nextSibling;
          while(sib){
            if(sib.classList&&sib.classList.contains('item-card')&&sib.dataset.id){
              insertBeforeId=sib.dataset.id;break;
            }
            sib=sib.nextSibling;
          }
        }
        ghost.remove();
      }
      ghost=null;
      // reorder array
      const fromIdx=arr.findIndex(x=>x.id===card.dataset.id);
      if(fromIdx<0)return;
      const [item]=arr.splice(fromIdx,1);
      if(insertBeforeId){
        const toIdx=arr.findIndex(x=>x.id===insertBeforeId);
        arr.splice(toIdx<0?arr.length:toIdx,0,item);
      }else{
        arr.push(item);
      }
      S.set(key,arr);renderFn();
    }

    // Touch
    handle.addEventListener('touchstart',e=>{e.preventDefault();begin(e.touches[0].clientY);},{passive:false});
    handle.addEventListener('touchmove', e=>{e.preventDefault();move(e.touches[0].clientY);},{passive:false});
    handle.addEventListener('touchend', ()=>end());
    handle.addEventListener('touchcancel',()=>end());

    // Mouse
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();
      begin(e.clientY);
      const onMove=ev=>move(ev.clientY);
      const onUp=()=>{end();window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
    });
  });
}

// ── CAT ORDER STORAGE ─────────────────────────────────
var catOrder={
  todo: S.get('mp_catorder_todo',[]),
  link: S.get('mp_catorder_link',[]),
  memo: S.get('mp_catorder_memo',[])
};

function getSortedCats(type, arr){
  var all=getCats(arr);
  var order=catOrder[type];
  // merge: keep saved order, append new cats not yet in order
  var sorted=order.filter(function(c){return all.indexOf(c)>=0;});
  all.forEach(function(c){if(sorted.indexOf(c)<0)sorted.push(c);});
  return sorted;
}

function moveCat(type, cat, dir){
  var arr=type==='todo'?todos:type==='link'?links:memos;
  var cats=getSortedCats(type,arr);
  var i=cats.indexOf(cat);
  var j=i+dir;
  if(j<0||j>=cats.length)return;
  var tmp=cats[i];cats[i]=cats[j];cats[j]=tmp;
  catOrder[type]=cats;
  S.set('mp_catorder_'+type,cats);
  if(type==='todo')renderTodos();
  else if(type==='link')renderLinks();
  else renderMemos();
}

// ── CAT TABS HELPER ───────────────────────────────────
function catTabsHTML(type, cats, active){
  if(!cats.length) return '';
  var html='<div class="cat-tabs">';
  html+='<div class="cat-tab'+(active===''?' active':'')+'" onclick="setFilter(\''+type+'\',\'\')">すべて</div>';
  cats.forEach(function(c, i){
    html+='<div class="cat-tab-wrap" style="display:inline-flex;align-items:center;gap:2px;">';
    html+='<div class="cat-tab'+(active===c?' active':'')+'" onclick="setFilter(\''+type+'\',\''+esc(c)+'\')">'+esc(c)+'</div>';
    html+='<button class="cat-order-btn" onclick="moveCat(\''+type+'\',\''+esc(c)+'\',-1)" title="上へ"'+(i===0?' disabled':'')+'>↑</button>';
    html+='<button class="cat-order-btn" onclick="moveCat(\''+type+'\',\''+esc(c)+'\',1)" title="下へ"'+(i===cats.length-1?' disabled':'')+'>↓</button>';
    html+='</div>';
  });
  html+='</div>';
  return html;
}

// ── EXPORT / IMPORT ───────────────────────────────────
function markUpdated(){
  localStorage.setItem('mp_last_updated', Date.now());
  checkUnsaved();
}
function checkUnsaved(){
  const updated = parseInt(localStorage.getItem('mp_last_updated')||'0');
  const exported = parseInt(localStorage.getItem('mp_last_exported')||'0');
  const btn = document.getElementById('export-btn');
  if(!btn) return;
  if(updated > exported && updated > 0){
    btn.classList.add('unsaved');
    btn.title = '未エクスポートの変更があります';
  } else {
    btn.classList.remove('unsaved');
    btn.title = '';
  }
}

function exportData(){
  const blob=new Blob([JSON.stringify({todos,links,memos,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`portal_${new Date().toISOString().slice(0,10)}.json`;a.click();
  localStorage.setItem('mp_last_exported', Date.now());
  checkUnsaved();
  toast('エクスポート完了');
}
function importTrigger(){document.getElementById('imp-file').click();}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{const d=JSON.parse(ev.target.result);
      if(d.todos){todos=d.todos;S.set('mp_todos',todos);}
      if(d.links){links=d.links;S.set('mp_links',links);}
      if(d.memos){memos=d.memos;S.set('mp_memos',memos);}
      markUpdated();renderTodos();renderLinks();renderMemos();toast('インポート完了');
    }catch{toast('エラー：ファイルが無効です');}
  };
  r.readAsText(f);e.target.value='';
}

// ── SCREEN WAKE LOCK ──────────────────────────────────
var wakeLock=null;
var wakeTimer=null;
var WAKE_MS=180*60*1000; // 180分

async function toggleWakeLock(){
  if(wakeLock){
    releaseWakeLock();
  } else {
    await requestWakeLock();
  }
}

async function requestWakeLock(){
  if(!('wakeLock' in navigator)){toast('このブラウザはScreen Wake Lockに非対応です');return;}
  try{
    wakeLock=await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release',function(){
      // fired when OS/browser releases it (e.g. tab hidden)
      setWakeUI(false);
      wakeLock=null;
      clearTimeout(wakeTimer);
    });
    setWakeUI(true);
    // auto-off after 180min
    clearTimeout(wakeTimer);
    wakeTimer=setTimeout(function(){releaseWakeLock();toast('Screen Wake Lock 180分経過 — 解除しました');},WAKE_MS);
  }catch(e){
    toast('Wake Lock取得に失敗しました: '+e.message);
  }
}

function releaseWakeLock(){
  if(wakeLock){wakeLock.release();wakeLock=null;}
  clearTimeout(wakeTimer);
  setWakeUI(false);
}

function setWakeUI(on){
  var btn=document.getElementById('wake-btn');
  var lbl=document.getElementById('wake-label');
  if(!btn)return;
  if(on){
    btn.classList.add('on');btn.classList.remove('off');
    lbl.textContent='Screen ON';
  } else {
    btn.classList.remove('on');btn.classList.add('off');
    lbl.textContent='Screen Off';
  }
}

// Windowsで他ウィンドウがアクティブになるとvisibilityがhiddenになりwakeLockが自動解除される
// 戻ってきたら自動的にUIを更新
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&wakeLock===null){
    var btn=document.getElementById('wake-btn');
    if(btn&&btn.classList.contains('on')){
      setWakeUI(false);
    }
  }
});

// ── FLOATING NAV + MINI NAV ────────────────────────────
function jumpTo(id){
  var el=document.getElementById(id);
  if(!el)return;
// ヘッダー実高さ(safe-area込み)をDOMから取得してオフセット計算
var headerEl=document.querySelector('header');
var miniNavEl=document.getElementById('mini-nav');
var headerH=headerEl?headerEl.getBoundingClientRect().height:52;
var miniNavH=miniNavEl?miniNavEl.getBoundingClientRect().height:38;
var offset=headerH+miniNavH+8;
var top=el.getBoundingClientRect().top+(window.scrollY||window.pageYOffset)-offset;
window.scrollTo({top:top,behavior:'smooth'});
}

function updateNavs(){
  var sections=['sec-todo','sec-links','sec-memo'];
  var miniIds=['mn-todo','mn-links','mn-memo'];
  var scrollY=window.scrollY||window.pageYOffset;
  var current='';

  var headerEl=document.querySelector('header');
  var miniNavEl=document.getElementById('mini-nav');
  var navH=(headerEl?headerEl.getBoundingClientRect().height:52)+(miniNavEl?miniNavEl.getBoundingClientRect().height:38);

  sections.forEach(function(sid){
    var el=document.getElementById(sid);
    if(el){
      var top=el.getBoundingClientRect().top+scrollY-navH;
      if(scrollY>=top)current=sid;
    }
  });


  // mini nav: show after scrolling past header (~60px), update active
  var miniNav=document.getElementById('mini-nav');
  if(miniNav){
    miniNav.classList.toggle('visible',scrollY>60);
    miniIds.forEach(function(mid,i){
      var btn=document.getElementById(mid);
      if(btn)btn.classList.toggle('active',current===sections[i]);
    });
  }
}

window.addEventListener('scroll',updateNavs,{passive:true});
setTimeout(updateNavs,300);

// ── CALENDAR ──────────────────────────────────────────
(function(){
  var calOffset=0;
  var DOWS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function renderCalendar(){
    var sec=document.getElementById('sec-calendar');
    if(!sec)return;
    var today=new Date();
    var todayY=today.getFullYear(),todayM=today.getMonth(),todayD=today.getDate();
    var base=new Date(todayY,todayM+calOffset,1);

    var months=[];
    for(var i=0;i<2;i++){
      var y=base.getFullYear();
      var m=base.getMonth()+i;
      if(m>11){m-=12;y++;}
      months.push({y:y,m:m});
    }

    var html='<div class="cal-wrap">'
      +'<div class="cal-header">'
      +'<button class="cal-nav-btn" onclick="calMove(-1)">&#8249;</button>'
      +'<div style="font-family:\'Inter\',sans-serif;font-size:12px;color:var(--muted);">'
      +months[0].y+'.'+String(months[0].m+1).padStart(2,'0')
      +'〜'
      +months[1].y+'.'+String(months[1].m+1).padStart(2,'0')
      +'</div>'
      +'<button class="cal-nav-btn" onclick="calMove(1)">&#8250;</button>'
      +'</div>'
      +'<div class="cal-months">';

    months.forEach(function(mv){
      html+='<div class="cal-month">';
      var mm=String(mv.m+1).padStart(2,'0');
      html+='<div class="cal-month-title">'+mv.y+'.'+mm+'</div>';
      html+='<div class="cal-grid">';
      DOWS.forEach(function(d){html+='<div class="cal-dow">'+d+'</div>';});
      var firstDay=new Date(mv.y,mv.m,1).getDay();
      var daysInMonth=new Date(mv.y,mv.m+1,0).getDate();
      for(var k=0;k<firstDay;k++)html+='<div class="cal-day"></div>';
      for(var d=1;d<=daysInMonth;d++){
        var isToday=(mv.y===todayY&&mv.m===todayM&&d===todayD);
        html+='<div class="cal-day'+(isToday?' today':'')+'">'+d+'</div>';
      }
      html+='</div></div>';
    });

    html+='</div></div>';
    sec.innerHTML=html;
  }

  window.calMove=function(dir){calOffset+=dir;renderCalendar();};
  window.renderCalendar=renderCalendar;
  renderCalendar();
})();

// ── INIT ──────────────────────────────────────────────
renderTodos();renderLinks();renderMemos();checkUnsaved();
</script>

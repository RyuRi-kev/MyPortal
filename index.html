<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --white:#ffffff;
  --bg:#ffffff;
  --line:#e2eaf0;
  --line2:#c8d8e4;
  --ink:#1e2c38;
  --ink2:#52707f;
  --muted:#96b0bc;
  --magenta:#d6008f;
  --cyan:#00b0c8;
  --g1:var(--magenta);--g2:var(--cyan);
  --grad:linear-gradient(135deg,var(--cyan) 0%,var(--magenta) 100%);
  --grad-soft:linear-gradient(135deg,rgba(0,176,200,.1) 0%,rgba(214,0,143,.08) 100%);
  --r:10px;
  --sh:0 1px 4px rgba(0,60,80,.07),0 4px 20px rgba(0,60,80,.06);
  --sh2:0 2px 10px rgba(0,60,80,.09),0 8px 32px rgba(0,60,80,.08);
}
html{background:#fff;}
body{background:#fff;color:var(--ink);font-family:'Inter','Noto Sans JP',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}

/* HEADER */
header{background:var(--white);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:200;}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;}
.logo{display:flex;align-items:center;gap:7px;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:.04em;text-decoration:none;color:var(--muted);}
.logo:hover{color:var(--ink2);}
.logo-mark{width:18px;height:18px;border-radius:5px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;flex-shrink:0;}
#hdate{font-family:'Inter',sans-serif;font-size:11.5px;color:var(--muted);letter-spacing:.03em;}
.accent-strip{height:2px;background:var(--grad);}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:24px 24px 80px;background:#fff;}
.section{margin-bottom:112px;background:#fff;}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-top:8px;}
.section-title{font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.section-line{flex:1;height:1.5px;background:var(--grad);opacity:.25;}
.section-count{font-family:'Inter',sans-serif;font-size:11px;color:var(--muted);}

/* ADD FORM - shadow only, no border */
.add-form{background:#fff;border:none;border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--sh);}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.form-row:last-child{margin-bottom:0;}
.fi{flex:1;min-width:100px;background:#f4f6f8;border:1px solid #e8ecf0;border-radius:6px;padding:8px 12px;font-family:'Noto Sans JP',sans-serif;font-size:13.5px;color:var(--ink);outline:none;transition:border-color .18s,background .18s;resize:vertical;}
.fi:focus{background:#fff;border-color:var(--cyan);}
::placeholder{color:var(--muted);}
.fi-auto{flex:0 0 auto;width:auto;}
textarea.fi{min-height:68px;}

/* CAT AUTOCOMPLETE */
.cat-wrap{position:relative;flex:1;min-width:100px;}
.cat-sug{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:400;background:var(--white);border:1px solid var(--line);border-radius:6px;box-shadow:var(--sh2);overflow:hidden;display:none;}
.cat-sug.open{display:block;}
.cs-item{padding:7px 12px;font-size:13px;cursor:pointer;transition:background .15s;}
.cs-item:hover{background:var(--bg);}

/* BUTTONS */
.btn{font-family:'Inter','Noto Sans JP',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;border-radius:6px;border:1px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-grad{background:var(--grad);color:#fff;border:none;box-shadow:0 2px 8px rgba(0,176,200,.2);}
.btn-grad:hover{opacity:.87;box-shadow:0 4px 16px rgba(214,0,143,.2);}
.btn-grad-outline{background:var(--grad);color:#fff;border:none;box-shadow:0 2px 8px rgba(214,0,143,.2);}
.btn-grad-outline:hover{opacity:.87;}
.btn-ghost{background:transparent;color:var(--ink2);border-color:var(--line);}
.btn-ghost:hover{border-color:var(--ink2);color:var(--ink);background:#f4f6f8;}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:5px;}

/* inline text action buttons (edit / delete) */
.btn-action{
  background:none;border:1px solid var(--line);
  border-radius:4px;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:10.5px;font-weight:500;
  color:var(--ink2);padding:2px 7px;
  transition:all .18s;line-height:1.4;white-space:nowrap;
}
.btn-action:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,176,200,.05);}
.btn-action.del:hover{border-color:#e05050;color:#e05050;background:rgba(224,80,80,.05);}

/* CAT TABS */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.cat-tab{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--line);background:var(--white);color:var(--ink2);cursor:pointer;transition:all .18s;}
.cat-tab:hover{border-color:var(--cyan);color:var(--cyan);}
.cat-tab.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,176,200,.18);}

/* CAT GROUP */
.cat-group{margin-bottom:12px;}
.cat-group-label{display:flex;align-items:center;gap:6px;margin-bottom:6px;padding-left:2px;}
.cat-badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10.5px;font-weight:500;background:var(--grad-soft);color:var(--cyan);border:1px solid rgba(0,176,200,.2);}

/* ITEM CARD - shadow only, no border */
.item-card{background:#fff;border:none;border-radius:8px;box-shadow:var(--sh);margin-bottom:8px;display:flex;align-items:stretch;position:relative;transition:box-shadow .2s,transform .18s;animation:rise .25s ease both;overflow:hidden;}
.item-card:hover{box-shadow:var(--sh2);}
.item-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--grad);opacity:0;transition:opacity .2s;}
.item-card:hover::before{opacity:1;}
.item-card.dragging{opacity:.45;transform:scale(.97);}
.item-card.drag-over{box-shadow:0 0 0 2px rgba(0,176,200,.3),var(--sh2);}

.drag-handle{padding:0 6px 0 10px;display:flex;align-items:center;color:var(--line2);cursor:grab;font-size:13px;user-select:none;touch-action:none;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}

.item-body{flex:1;padding:10px 10px 10px 0;min-width:0;}
.item-top{display:flex;align-items:flex-start;gap:6px;}
.item-main{flex:1;min-width:0;}
.item-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;padding-top:2px;}

/* link */
.link-name{font-size:13.5px;font-weight:500;color:var(--ink);text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.link-name:hover{color:var(--cyan);}
.link-url{font-family:'Inter',monospace;font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.link-status{width:6px;height:6px;border-radius:50%;background:var(--line);flex-shrink:0;margin-top:6px;transition:background .3s;}
.ls-ok{background:#2d6a4f;box-shadow:0 0 4px rgba(45,106,79,.4);}
.ls-ng{background:#c0392b;}
.ls-chk{background:#e67e22;animation:blink .6s infinite;}

/* todo */
.todo-row{display:flex;align-items:center;gap:8px;}
.t-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--line2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all .18s;}
.done .t-check{background:var(--grad);border-color:transparent;}
.todo-txt{font-size:13.5px;}
.done .todo-txt{text-decoration:line-through;color:var(--muted);}
.p-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.ph{background:#c0392b;}.pm{background:#e67e22;}.pl{background:var(--muted);}

/* memo */
.memo-txt{font-size:13.5px;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
.memo-ts{font-family:'Inter',monospace;font-size:10.5px;color:var(--muted);margin-top:3px;}

/* edit form */
.edit-form{display:none;padding:8px 0 4px;}
.edit-form.open{display:block;}
.edit-form .form-row{margin-bottom:6px;}
.edit-form .form-row:last-child{margin-bottom:0;}

/* empty */
.empty{padding:24px;text-align:center;color:var(--muted);font-size:13px;border:1.5px dashed var(--line);border-radius:8px;}

/* FOOTER */
footer{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);z-index:200;}
.footer-inner{max-width:1100px;margin:0 auto;padding:10px 24px;display:flex;justify-content:flex-end;gap:8px;}

/* TOAST */
#toast{position:fixed;bottom:64px;right:20px;z-index:9000;background:var(--ink2);color:#fff;font-size:12.5px;padding:9px 18px;border-radius:7px;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;box-shadow:0 4px 20px rgba(0,60,80,.2);}
#toast.show{opacity:1;transform:translateY(0);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,60,80,.25);z-index:500;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:12px;padding:28px 28px 20px;max-width:340px;width:calc(100% - 40px);box-shadow:0 8px 40px rgba(0,60,80,.12);animation:rise .2s ease;}
.modal h3{font-family:'Inter',sans-serif;font-size:16px;font-weight:600;margin-bottom:8px;}
.modal p{font-size:13.5px;color:var(--ink2);margin-bottom:20px;line-height:1.6;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}

/* ANIMATIONS */
@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* RESPONSIVE */
@media(max-width:600px){
  .header-inner,.footer-inner{padding-left:16px;padding-right:16px;}
  main{padding:16px 16px 80px;}
  #hclock{display:none;}
  .form-row{flex-direction:column;}
  .fi-auto,.cat-wrap{flex:none;width:100%;}
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px;}
</style>
</head>
<body>

<div class="accent-strip"></div>
<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-mark">P</div>my portal
    </a>
    <span id="hdate"></span>
  </div>
</header>

<main>
  <div id="sec-todo" class="section"></div>
  <div id="sec-links" class="section"></div>
  <div id="sec-memo" class="section"></div>
</main>

<footer>
  <div class="footer-inner">
    <button class="btn btn-grad-outline btn-sm" onclick="importTrigger()">Import</button>
    <button class="btn btn-grad btn-sm" onclick="exportData()">Export JSON</button>
    <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</footer>

<div class="overlay" id="del-modal">
  <div class="modal">
    <h3>削除しますか？</h3>
    <p>この操作は元に戻せません。</p>
    <div class="modal-btns">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-sm" id="del-ok" style="background:#c0392b;color:#fff;border:none;">削除する</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STORAGE ──────────────────────────────────────────────
const S={
  get(k,d){try{return JSON.parse(localStorage.getItem(k))||d;}catch{return d;}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v));}
};
let todos=S.get('mp_todos',[]);
let links=S.get('mp_links',[]);
let memos=S.get('mp_memos',[]);

// ── DATE ──────────────────────────────────────────────
(function updateDate(){
  const d=new Date(),p=n=>n.toString().padStart(2,'0');
  const D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('hdate').textContent=`${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${D[d.getDay()]}`;
  // update at midnight
  const msToMidnight=(new Date().setHours(24,0,0,0))-Date.now();
  setTimeout(updateDate,msToMidnight);
})();

// ── UTILS ─────────────────────────────────────────────
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const nowStr=()=>{const d=new Date(),p=n=>n.toString().padStart(2,'0');return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;};
const getCats=arr=>[...new Set(arr.map(x=>x.cat||'').filter(Boolean))];
const groupBy=arr=>{const g={};arr.forEach(x=>{const c=x.cat||'';if(!g[c])g[c]=[];g[c].push(x);});return g;};

function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2200);}

// ── DELETE MODAL ───────────────────────────────────────
let _dcb=null;
function confirmDel(cb){_dcb=cb;document.getElementById('del-modal').classList.add('open');document.getElementById('del-ok').onclick=()=>{_dcb&&_dcb();closeModal();};}
function closeModal(){document.getElementById('del-modal').classList.remove('open');}

// ── CAT AUTOCOMPLETE ───────────────────────────────────
function bindCatAC(inputId,sugId,getCatsFn){
  const inp=document.getElementById(inputId);
  const sug=document.getElementById(sugId);
  if(!inp||!sug)return;
  inp.addEventListener('input',()=>{
    const v=inp.value.toLowerCase();
    const cs=getCatsFn().filter(c=>c.toLowerCase().includes(v));
    if(cs.length&&inp.value){
      var html='';
      cs.forEach(function(c){
        html+='<div class="cs-item" onmousedown="event.preventDefault();document.getElementById(\''+inputId+'\').value=\''+esc(c)+'\';document.getElementById(\''+sugId+'\').classList.remove(\'open\')">'+esc(c)+'</div>';
      });
      sug.innerHTML=html;
      sug.classList.add('open');
    }else sug.classList.remove('open');
  });
  inp.addEventListener('blur',()=>setTimeout(()=>sug.classList.remove('open'),150));
}

// ── SORT (touch + mouse, iOS compatible) ──────────────
function setupDrag(containerId,arr,key,renderFn){
  const container=document.getElementById(containerId);
  if(!container)return;

  container.querySelectorAll('.item-card[data-id]').forEach(card=>{
    const handle=card.querySelector('.drag-handle');
    if(!handle)return;

    let active=false,startY=0,origIdx=-1,clone=null,ghost=null;

    function allCards(){return [...container.querySelectorAll('.item-card[data-id]')];}

    function begin(clientY){
      active=true;
      startY=clientY;
      origIdx=allCards().indexOf(card);
      const r=card.getBoundingClientRect();
      // ghost placeholder
      ghost=document.createElement('div');
      ghost.style.cssText=`height:${r.height}px;margin-bottom:5px;border-radius:8px;background:rgba(0,176,200,.07);border:1.5px dashed rgba(0,176,200,.3);flex-shrink:0;`;
      card.after(ghost);
      // floating clone
      clone=card.cloneNode(true);
      clone.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;z-index:9999;opacity:.85;box-shadow:0 8px 32px rgba(0,60,80,.2);pointer-events:none;border-radius:8px;`;
      document.body.appendChild(clone);
      card.style.opacity='0';
    }

    function move(clientY){
      if(!active||!clone)return;
      const dy=clientY-startY;
      const r=card.getBoundingClientRect();
      clone.style.top=(r.top+dy)+'px';
      // find insertion point
      const others=allCards().filter(c=>c!==card);
      let before=null;
      for(const c of others){
        const cr=c.getBoundingClientRect();
        if(clientY<cr.top+cr.height*.5){before=c;break;}
      }
      if(before) container.insertBefore(ghost,before);
      else container.appendChild(ghost);
    }

    function end(){
      if(!active)return;
      active=false;
      if(clone){clone.remove();clone=null;}
      card.style.opacity='';
      // determine new index from ghost position
      const siblings=[...container.children].filter(el=>el!==card);
      const newIdx=siblings.indexOf(ghost);
      if(ghost)ghost.remove();
      ghost=null;
      // reorder array
      const fromIdx=arr.findIndex(x=>x.id===card.dataset.id);
      if(fromIdx<0)return;
      const [item]=arr.splice(fromIdx,1);
      const insertAt=newIdx<0?arr.length:Math.min(newIdx,arr.length);
      arr.splice(insertAt,0,item);
      S.set(key,arr);renderFn();
    }

    // Touch
    handle.addEventListener('touchstart',e=>{e.preventDefault();begin(e.touches[0].clientY);},{passive:false});
    handle.addEventListener('touchmove', e=>{e.preventDefault();move(e.touches[0].clientY);},{passive:false});
    handle.addEventListener('touchend', ()=>end());
    handle.addEventListener('touchcancel',()=>end());

    // Mouse
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();
      begin(e.clientY);
      const onMove=ev=>move(ev.clientY);
      const onUp=()=>{end();window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
    });
  });
}

// ── CAT TABS HELPER (avoids nested template literals for iOS Safari) ──
function catTabsHTML(type, cats, active){
  if(!cats.length) return '';
  var html='<div class="cat-tabs">';
  html+='<div class="cat-tab'+(active===''?' active':'')+'" onclick="setFilter(\''+type+'\',\'\')">すべて</div>';
  cats.forEach(function(c){
    html+='<div class="cat-tab'+(active===c?' active':'')+'" onclick="setFilter(\''+type+'\',\''+esc(c)+'\')">'+esc(c)+'</div>';
  });
  html+='</div>';
  return html;
}

// ── FILTER STATE ───────────────────────────────────────
const F={todo:'',link:'',memo:''};
function setFilter(type,cat){
  F[type]=cat;
  if(type==='todo')renderTodos();
  else if(type==='link')renderLinks();
  else renderMemos();
}

// ── TODO ───────────────────────────────────────────────
function renderTodos(){
  const sec=document.getElementById('sec-todo');
  const cats=getCats(todos);
  const vis=F.todo?todos.filter(t=>t.cat===F.todo):todos;
  const grouped=groupBy(vis);

  sec.innerHTML=`
<div class="section-header">
  <span class="section-title">Todo</span>
  <span class="section-line"></span>
  <span class="section-count">${todos.filter(t=>!t.done).length} 件残り</span>
</div>
<div class="add-form">
  <div class="form-row">
    <input class="fi" id="tt" placeholder="タスクを入力…" onkeydown="if(event.key==='Enter')addTodo()">
    <select class="fi fi-auto" id="tp" style="width:72px">
      <option value="high">高</option><option value="mid" selected>中</option><option value="low">低</option>
    </select>
  </div>
  <div class="form-row">
    <div class="cat-wrap"><input class="fi" id="tc" placeholder="分類（任意）" autocomplete="off"><div class="cat-sug" id="tc-sug"></div></div>
    <button class="btn btn-grad btn-sm" onclick="addTodo()">追加</button>
  </div>
</div>
${catTabsHTML('todo',cats,F.todo)}
<div id="todo-list"></div>`;

  bindCatAC('tc','tc-sug',()=>getCats(todos));
  const list=document.getElementById('todo-list');
  if(!vis.length){list.innerHTML='<div class="empty">タスクはありません</div>';return;}
  Object.entries(grouped).forEach(([cat,items])=>{
    const g=document.createElement('div');g.className='cat-group';
    if(cat)g.innerHTML=`<div class="cat-group-label"><span class="cat-badge">${esc(cat)}</span></div>`;
    items.forEach(t=>{
      const card=document.createElement('div');card.className='item-card'+(t.done?' done':'');card.dataset.id=t.id;
      card.innerHTML=`
<div class="drag-handle">⠿</div>
<div class="item-body">
  <div class="item-top">
    <div class="item-main">
      <div class="todo-row">
        <div class="t-check" onclick="toggleTodo('${t.id}')">${t.done?'✓':''}</div>
        <div class="todo-txt">${esc(t.text)}</div>
        <div class="p-dot p${t.priority||'m'}" title="優先度：${t.priority||'mid'}"></div>
      </div>
    </div>
    <div class="item-actions">
      <button class="btn-action" onclick="openTodoEdit('${t.id}')">edit</button>
      <button class="btn-action del" onclick="delTodo('${t.id}')">delete</button>
    </div>
  </div>
  <div class="edit-form" id="te-${t.id}">
    <div class="form-row">
      <input class="fi" id="tei-${t.id}" value="${esc(t.text)}" placeholder="タスク">
      <select class="fi fi-auto" id="tep-${t.id}" style="width:72px">
        <option value="high"${t.priority==='high'?' selected':''}>高</option>
        <option value="mid"${(!t.priority||t.priority==='mid')?' selected':''}>中</option>
        <option value="low"${t.priority==='low'?' selected':''}>低</option>
      </select>
    </div>
    <div class="form-row">
      <div class="cat-wrap"><input class="fi" id="tec-${t.id}" value="${esc(t.cat||'')}" placeholder="分類" autocomplete="off"><div class="cat-sug" id="tec-sug-${t.id}"></div></div>
      <button class="btn btn-ghost btn-sm" onclick="closeTodoEdit('${t.id}')">キャンセル</button>
      <button class="btn btn-grad btn-sm" onclick="saveTodoEdit('${t.id}')">保存</button>
    </div>
  </div>
</div>`;
      g.appendChild(card);
      bindCatAC(`tec-${t.id}`,`tec-sug-${t.id}`,()=>getCats(todos));
    });
    list.appendChild(g);
  });
  setupDrag('todo-list',todos,'mp_todos',renderTodos);
}
function addTodo(){
  const text=document.getElementById('tt').value.trim();
  if(!text){toast('タスクを入力してください');return;}
  todos.push({id:uid(),text,priority:document.getElementById('tp').value,cat:document.getElementById('tc').value.trim(),done:false});
  S.set('mp_todos',todos);document.getElementById('tt').value='';document.getElementById('tc').value='';
  renderTodos();toast('追加しました');
}
function toggleTodo(id){const t=todos.find(x=>x.id===id);if(t){t.done=!t.done;S.set('mp_todos',todos);renderTodos();}}
function openTodoEdit(id){document.getElementById(`te-${id}`).classList.add('open');}
function closeTodoEdit(id){document.getElementById(`te-${id}`).classList.remove('open');}
function saveTodoEdit(id){
  const t=todos.find(x=>x.id===id);if(!t)return;
  const v=document.getElementById(`tei-${id}`).value.trim();
  if(v)t.text=v;
  t.priority=document.getElementById(`tep-${id}`).value;
  t.cat=document.getElementById(`tec-${id}`).value.trim();
  S.set('mp_todos',todos);renderTodos();toast('更新しました');
}
function delTodo(id){confirmDel(()=>{todos=todos.filter(x=>x.id!==id);S.set('mp_todos',todos);renderTodos();toast('削除しました');});}

// ── LINKS ──────────────────────────────────────────────
function renderLinks(){
  const sec=document.getElementById('sec-links');
  const cats=getCats(links);
  const vis=F.link?links.filter(l=>l.cat===F.link):links;
  const grouped=groupBy(vis);

  sec.innerHTML=`
<div class="section-header">
  <span class="section-title">Links</span>
  <span class="section-line"></span>
  <span class="section-count">${links.length} 件</span>
</div>
<div class="add-form">
  <div class="form-row">
    <input class="fi" id="ln" placeholder="名前">
    <input class="fi" id="lu" type="url" placeholder="https://...">
  </div>
  <div class="form-row">
    <div class="cat-wrap"><input class="fi" id="lc" placeholder="分類（任意）" autocomplete="off"><div class="cat-sug" id="lc-sug"></div></div>
    <button class="btn btn-grad btn-sm" onclick="addLink()">追加</button>
    <button class="btn btn-ghost btn-sm" onclick="checkAllLinks()">全チェック</button>
  </div>
</div>
${catTabsHTML('link',cats,F.link)}
<div id="link-list"></div>`;

  bindCatAC('lc','lc-sug',()=>getCats(links));
  const list=document.getElementById('link-list');
  if(!vis.length){list.innerHTML='<div class="empty">リンクはありません</div>';return;}
  Object.entries(grouped).forEach(([cat,items])=>{
    const g=document.createElement('div');g.className='cat-group';
    if(cat)g.innerHTML=`<div class="cat-group-label"><span class="cat-badge">${esc(cat)}</span></div>`;
    items.forEach(lk=>{
      const sc=lk.status==='ok'?'ls-ok':lk.status==='ng'?'ls-ng':lk.status==='chk'?'ls-chk':'';
      const card=document.createElement('div');card.className='item-card';card.dataset.id=lk.id;
      card.innerHTML=`
<div class="drag-handle">⠿</div>
<div class="item-body">
  <div class="item-top">
    <div class="link-status ${sc}" id="ls-${lk.id}" style="margin-top:7px;margin-left:4px;margin-right:2px;"></div>
    <div class="item-main" style="padding-left:4px">
      <a class="link-name" href="${esc(lk.url)}" target="_blank" rel="noopener">${esc(lk.name||lk.url)}</a>
      <span class="link-url">${esc(lk.url)}</span>
    </div>
    <div class="item-actions">
      <button class="btn-action" onclick="checkLink('${lk.id}')">check</button>
      <button class="btn-action" onclick="openLinkEdit('${lk.id}')">edit</button>
      <button class="btn-action del" onclick="delLink('${lk.id}')">delete</button>
    </div>
  </div>
  <div class="edit-form" id="le-${lk.id}">
    <div class="form-row">
      <input class="fi" id="lei-${lk.id}" value="${esc(lk.name)}" placeholder="名前">
      <input class="fi" id="leu-${lk.id}" value="${esc(lk.url)}" placeholder="URL" type="url">
    </div>
    <div class="form-row">
      <div class="cat-wrap"><input class="fi" id="lec-${lk.id}" value="${esc(lk.cat||'')}" placeholder="分類" autocomplete="off"><div class="cat-sug" id="lec-sug-${lk.id}"></div></div>
      <button class="btn btn-ghost btn-sm" onclick="closeLinkEdit('${lk.id}')">キャンセル</button>
      <button class="btn btn-grad btn-sm" onclick="saveLinkEdit('${lk.id}')">保存</button>
    </div>
  </div>
</div>`;
      g.appendChild(card);
      bindCatAC(`lec-${lk.id}`,`lec-sug-${lk.id}`,()=>getCats(links));
    });
    list.appendChild(g);
  });
  setupDrag('link-list',links,'mp_links',renderLinks);
}
function addLink(){
  const u=document.getElementById('lu').value.trim();
  if(!u){toast('URLを入力してください');return;}
  links.push({id:uid(),name:document.getElementById('ln').value.trim()||u,url:u,cat:document.getElementById('lc').value.trim(),status:''});
  S.set('mp_links',links);document.getElementById('ln').value='';document.getElementById('lu').value='';document.getElementById('lc').value='';
  renderLinks();toast('追加しました');
}
function openLinkEdit(id){document.getElementById(`le-${id}`).classList.add('open');}
function closeLinkEdit(id){document.getElementById(`le-${id}`).classList.remove('open');}
function saveLinkEdit(id){
  const lk=links.find(x=>x.id===id);if(!lk)return;
  const n=document.getElementById(`lei-${id}`).value.trim();const u=document.getElementById(`leu-${id}`).value.trim();
  if(n)lk.name=n;if(u)lk.url=u;
  lk.cat=document.getElementById(`lec-${id}`).value.trim();
  S.set('mp_links',links);renderLinks();toast('更新しました');
}
function delLink(id){confirmDel(()=>{links=links.filter(x=>x.id!==id);S.set('mp_links',links);renderLinks();toast('削除しました');});}
async function checkLink(id){
  const lk=links.find(x=>x.id===id);if(!lk)return;
  lk.status='chk';renderLinks();
  try{const c=new AbortController();const t=setTimeout(()=>c.abort(),6000);await fetch(lk.url,{method:'HEAD',mode:'no-cors',signal:c.signal});clearTimeout(t);lk.status='ok';}
  catch(e){lk.status=e.name==='AbortError'?'ng':'ok';}
  S.set('mp_links',links);renderLinks();
}
async function checkAllLinks(){for(const lk of links)await checkLink(lk.id);toast('チェック完了');}

// ── MEMOS ──────────────────────────────────────────────
function renderMemos(){
  const sec=document.getElementById('sec-memo');
  const cats=getCats(memos);
  const vis=F.memo?memos.filter(m=>m.cat===F.memo):memos;
  const grouped=groupBy([...vis].reverse());

  sec.innerHTML=`
<div class="section-header">
  <span class="section-title">Memo</span>
  <span class="section-line"></span>
  <span class="section-count">${memos.length} 件</span>
</div>
<div class="add-form">
  <div class="form-row"><textarea class="fi" id="mi" placeholder="メモを入力…" rows="3"></textarea></div>
  <div class="form-row">
    <div class="cat-wrap"><input class="fi" id="mc" placeholder="分類（任意）" autocomplete="off"><div class="cat-sug" id="mc-sug"></div></div>
    <button class="btn btn-grad btn-sm" onclick="addMemo()">保存</button>
  </div>
</div>
${catTabsHTML('memo',cats,F.memo)}
<div id="memo-list"></div>`;

  bindCatAC('mc','mc-sug',()=>getCats(memos));
  const list=document.getElementById('memo-list');
  if(!vis.length){list.innerHTML='<div class="empty">メモはありません</div>';return;}
  Object.entries(grouped).forEach(([cat,items])=>{
    const g=document.createElement('div');g.className='cat-group';
    if(cat)g.innerHTML=`<div class="cat-group-label"><span class="cat-badge">${esc(cat)}</span></div>`;
    items.forEach(m=>{
      const card=document.createElement('div');card.className='item-card';card.dataset.id=m.id;
      card.innerHTML=`
<div class="drag-handle">⠿</div>
<div class="item-body">
  <div class="item-top">
    <div class="item-main">
      <div class="memo-txt">${esc(m.text)}</div>
      <div class="memo-ts">${esc(m.ts)}</div>
    </div>
    <div class="item-actions">
      <button class="btn-action" onclick="openMemoEdit('${m.id}')">edit</button>
      <button class="btn-action del" onclick="delMemo('${m.id}')">delete</button>
    </div>
  </div>
  <div class="edit-form" id="me-${m.id}">
    <div class="form-row"><textarea class="fi" id="mei-${m.id}" rows="3">${esc(m.text)}</textarea></div>
    <div class="form-row">
      <div class="cat-wrap"><input class="fi" id="mec-${m.id}" value="${esc(m.cat||'')}" placeholder="分類" autocomplete="off"><div class="cat-sug" id="mec-sug-${m.id}"></div></div>
      <button class="btn btn-ghost btn-sm" onclick="closeMemoEdit('${m.id}')">キャンセル</button>
      <button class="btn btn-grad btn-sm" onclick="saveMemoEdit('${m.id}')">保存</button>
    </div>
  </div>
</div>`;
      g.appendChild(card);
      bindCatAC(`mec-${m.id}`,`mec-sug-${m.id}`,()=>getCats(memos));
    });
    list.appendChild(g);
  });
  setupDrag('memo-list',memos,'mp_memos',renderMemos);
}
function addMemo(){
  const text=document.getElementById('mi').value.trim();
  if(!text){toast('メモを入力してください');return;}
  memos.push({id:uid(),text,cat:document.getElementById('mc').value.trim(),ts:nowStr()});
  S.set('mp_memos',memos);document.getElementById('mi').value='';document.getElementById('mc').value='';
  renderMemos();toast('保存しました');
}
function openMemoEdit(id){document.getElementById(`me-${id}`).classList.add('open');}
function closeMemoEdit(id){document.getElementById(`me-${id}`).classList.remove('open');}
function saveMemoEdit(id){
  const m=memos.find(x=>x.id===id);if(!m)return;
  const v=document.getElementById(`mei-${id}`).value.trim();if(v)m.text=v;
  m.cat=document.getElementById(`mec-${id}`).value.trim();
  S.set('mp_memos',memos);renderMemos();toast('更新しました');
}
function delMemo(id){confirmDel(()=>{memos=memos.filter(x=>x.id!==id);S.set('mp_memos',memos);renderMemos();toast('削除しました');});}

// ── EXPORT / IMPORT ───────────────────────────────────
function exportData(){
  const blob=new Blob([JSON.stringify({todos,links,memos,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`portal_${new Date().toISOString().slice(0,10)}.json`;a.click();toast('エクスポート完了');
}
function importTrigger(){document.getElementById('imp-file').click();}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{const d=JSON.parse(ev.target.result);
      if(d.todos){todos=d.todos;S.set('mp_todos',todos);}
      if(d.links){links=d.links;S.set('mp_links',links);}
      if(d.memos){memos=d.memos;S.set('mp_memos',memos);}
      renderTodos();renderLinks();renderMemos();toast('インポート完了');
    }catch{toast('エラー：ファイルが無効です');}
  };
  r.readAsText(f);e.target.value='';
}

// ── INIT ──────────────────────────────────────────────
renderTodos();renderLinks();renderMemos();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Polygon Design: Cyan & Magenta</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 40px;
            padding: 24px;
            text-align: center;
        }
        h2 {
            border-left: 5px solid cyan;
            padding-left: 15px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: left;
        }
        svg {
            max-width: 100%;
            height: auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        code {
            display: block;
            background: #272822;
            color: #f8f8f2;
            padding: 10px;
            border-radius: 5px;
            text-align: left;
            font-size: 0.85rem;
            margin-top: 15px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SVG Polygon Design Gallery</h1>
    <p>シアン ($#00FFFF$) と マゼンタ ($#FF00FF$) を使用した多角形デザイン</p>

    <div class="card">
        <h2>1. 抽象的な幾何学レイヤー (Overlapping Triangles)</h2>
        <svg viewBox="0 0 500 300" width="500" height="300">
            <rect width="100%" height="100%" fill="#fafafa"/>
            <polygon points="50,50 180,50 115,180" fill="cyan" opacity="0.6" />
            <polygon points="130,100 260,100 195,230" fill="magenta" opacity="0.6" />
            <polygon points="300,40 460,140 340,260" fill="cyan" opacity="0.5" />
            <polygon points="360,80 490,190 400,290" fill="magenta" opacity="0.5" />
        </svg>
    </div>

    <div class="card">
        <h2>2. 重なる六角形のロゴ風 (Hexagon Fusion)</h2>
        <svg viewBox="0 0 400 300" width="400" height="300">
            <defs>
                <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="cyan" />
                    <stop offset="100%" stop-color="magenta" />
                </linearGradient>
            </defs>
            <polygon points="120,80 180,110 180,190 120,220 60,190 60,110" fill="cyan" />
            <polygon points="220,80 280,110 280,190 220,220 160,190 160,110" fill="magenta" opacity="0.8" />
            <polygon points="160,110 180,110 180,190 160,190" fill="url(#grad2)" />
        </svg>
    </div>

    <div class="card">
        <h2>3. モダン・プログレス・インジケータ (Arrow Shapes)</h2>
        <svg viewBox="0 0 500 150" width="500" height="150">
            <polygon points="10,40 200,40 230,75 200,110 10,110" fill="cyan" />
            <polygon points="215,40 405,40 435,75 405,110 215,110" fill="magenta" />
            <polygon points="450,65 470,75 450,85" fill="#333" />
        </svg>
    </div>

    <div class="card">
        <h2>4. ローポリゴン・グラデーション (Low-Poly Mesh)</h2>
        <svg viewBox="0 0 600 300" width="600" height="300">
            <defs>
                <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00FFFF" />
                    <stop offset="100%" stop-color="#FF00FF" />
                </linearGradient>
            </defs>
            <rect width="100%" height="100%" fill="url(#mainGrad)" />
            <g fill="none" stroke="white" stroke-width="0.5" opacity="0.3">
                <polygon points="0,0 150,0 75,100" />
                <polygon points="150,0 300,0 225,100" />
                <polygon points="300,0 450,0 375,100" />
                <polygon points="450,0 600,0 525,100" />
                <polygon points="75,100 225,100 150,200" />
                <polygon points="225,100 375,100 300,200" />
                <polygon points="375,100 525,100 450,200" />
                <polygon points="0,100 75,100 0,200" />
                <polygon points="150,200 300,200 225,300" />
                <polygon points="300,200 450,200 375,300" />
            </g>
        </svg>
    </div>
</div>

</body>
</html>
